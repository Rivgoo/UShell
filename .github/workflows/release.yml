name: Build and Release UShell

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Calculate Version
        id: version
        run: |
          FULL_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          
          VERSION_PREFIX=$(echo $FULL_TAG | sed 's/^v//' | cut -d. -f1-2)
          
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            PATCH_COUNT=$(git rev-list --count $FULL_TAG..HEAD)
          else
            PATCH_COUNT=$(git rev-list --count HEAD)
          fi
          
          VERSION="v${VERSION_PREFIX}.${PATCH_COUNT}"
          
          echo "Calculated Version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate Meta Files List
        run: |
          echo "Assets/Plugins/UShell.meta" > metaList.txt
          find Assets/Plugins/UShell -name \*.meta >> metaList.txt

      - name: Build .unitypackage
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          package-path: 'UShell-${{ env.VERSION }}.unitypackage'
          include-files: 'metaList.txt'

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "UShell ${{ env.VERSION }}"
          files: UShell-${{ env.VERSION }}.unitypackage
          generate_release_notes: true
          draft: false
          prerelease: false